<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main_layout(~{::#form-page})}">
<head>
    <title>Сохранение услуги</title>
</head>
<body>

<div id="form-page" class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow">
            <h3 class="mb-4 text-center text-danger fw-bold"
                th:text="${service.id != null} ? 'Редактировать услугу' : 'Добавить новую услугу'">
                Форма услуги
            </h3>

            <form th:action="@{/add-service}" th:object="${service}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="name" class="form-label text-secondary">Название услуги</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="name" th:field="*{name}" required placeholder="Например: Полировка фар">
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label text-secondary">Описание</label>
                    <textarea class="form-control bg-dark text-white border-secondary" id="description" th:field="*{description}" rows="3" placeholder="Опишите детали услуги..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="price" class="form-label text-secondary">Стоимость (₽)</label>
                    <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="price" th:field="*{price}" required placeholder="0.00">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/services" class="btn btn-outline-secondary">Назад к списку</a>
                    <button type="submit" class="btn btn-dangerpx-4 btn-danger">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
