<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main_layout(~{::#services-page})}">
<head>
    <title>Управление услугами</title>
</head>
<body>

<div id="services-page">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Список доступных услуг</h2>
        <a href="/add-service" class="btn btn-danger">Добавить новую услугу</a>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-dark table-striped table-hover align-middle mb-0 border border-secondary">
            <thead class="table-secondary border-bottom border-secondary">
            <tr>
                <th scope="col" class="ps-3">Название</th>
                <th scope="col">Описание</th>
                <th scope="col">Цена</th>
                <th scope="col" class="text-center">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="service : ${services}">
                <td class="fw-bold text-danger ps-3" th:text="${service.name}">Название</td>
                <td class="text-secondary" th:text="${service.description}">Описание</td>
                <td class="fw-bold" th:text="${service.price} + ' ₽'">0 ₽</td>
                <td class="text-center">
                    <a th:href="@{/edit-service/{id}(id=${service.id})}" class="btn btn-sm btn-outline-warning me-2">Редактировать</a>
                    <a th:href="@{/delete-service/{id}(id=${service.id})}" class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Вы уверены, что хотите удалить эту услугу?')">Удалить</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(services)}">
                <td colspan="4" class="text-center text-muted py-4">Список услуг пока пуст.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
