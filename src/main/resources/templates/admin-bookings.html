<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main_layout(~{::#admin-content})}">
<head>
    <title>Панель заказов - Администратор</title>
</head>
<body>

<div id="admin-content" class="container-fluid my-5 px-4">
    <h2 class="text-white fw-bold mb-4 border-bottom border-danger pb-2">УПРАВЛЕНИЕ ЗАЯВКАМИ (CRM)</h2>

    <div class="table-responsive bg-dark p-3 rounded border border-secondary shadow">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead class="table-secondary text-dark">
            <tr>
                <th>ID</th>
                <th>Клиент</th>
                <th>Телефон</th>
                <th>Автомобиль</th>
                <th>Услуга</th>
                <th>Статус</th>
                <th>Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.id}" class="fw-bold text-danger">1</td>
                <td th:text="${b.clientName}">Иван</td>
                <td th:text="${b.clientPhone}">+7...</td>
                <td th:text="${b.carModel}" class="text-warning">Audi RS6</td>
                <td th:text="${b.service.name}">Керамика</td>
                <td>
                            <span th:text="${b.status}"
                                  th:class="${b.status == 'НОВАЯ' ? 'badge bg-danger' : (b.status == 'В_РАБОТЕ' ? 'badge bg-warning text-dark' : 'badge bg-success')}">
                            </span>
                </td>
                <td>
                    <form th:action="@{/admin/bookings/status/{id}(id=${b.id})}" method="post" class="d-inline-flex gap-2">
                        <select name="status" class="form-select form-select-sm bg-secondary text-white border-dark" style="width: auto;">
                            <option value="НОВАЯ" th:selected="${b.status == 'НОВАЯ'}">Новая</option>
                            <option value="В_РАБОТЕ" th:selected="${b.status == 'В_РАБОТЕ'}">В работе</option>
                            <option value="ЗАВЕРШЕНА" th:selected="${b.status == 'ЗАВЕРШЕНА'}">Завершена</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-outline-light">Обновить</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="7" class="text-center text-secondary py-4">Новых заявок пока нет. Ждем клиентов!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
