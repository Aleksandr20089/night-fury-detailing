<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Админка - Заявки</title>
</head>
<body style="background: #0a0a0a; color: #fff; padding: 40px; font-family: sans-serif;">
<h2 style="color: #00d4ff;">Управление заявками</h2>
<table border="1" style="width: 100%; border-collapse: collapse; color: #fff;">
    <tr style="background: #111;">
        <th>Имя</th>
        <th>Телефон</th>
        <th>Услуга</th>
        <th>Статус</th>
    </tr>
    <tr th:each="app : ${appointments}">
        <td th:text="${app.clientName}"></td>
        <td th:text="${app.phone}"></td>
        <td th:text="${app.serviceName}"></td>
        <td th:text="${app.status}"></td>
    </tr>
</table>
</body>
</html>
